services:
  postgres:
    image: postgres:16-alpine
    container_name: customermates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customermates-app
    depends_on:
      - postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-4000}:4000"

  webhook-worker:
    image: curlimages/curl:8.11.1
    container_name: customermates-webhook-worker
    depends_on:
      - app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEBHOOK_CRON_URL: http://app:4000/api/cron/webhook-deliveries
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do curl -sf -H "Authorization: Bearer $${CRON_SECRET}" "$${WEBHOOK_CRON_URL}" || true; sleep 5; done'

volumes:
  postgres-data:
