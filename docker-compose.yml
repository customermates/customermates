services:
  postgres:
    image: postgres:16-alpine
    container_name: customermates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: ghcr.io/customermates/customermates:latest
    container_name: customermates-app
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      RESEND_OPERATOR_EMAIL: ${RESEND_OPERATOR_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      TRIGGER_SECRET_KEY: ${TRIGGER_SECRET_KEY}
      TRIGGER_PROJECT_REF: ${TRIGGER_PROJECT_REF}
    ports:
      - "${APP_PORT:-4000}:4000"

volumes:
  postgres-data:
