services:
  postgres:
    image: postgres:16-alpine
    container_name: customermates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: ghcr.io/customermates/customermates:latest
    container_name: customermates-app
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      CRON_SECRET: ${CRON_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
    ports:
      - "${APP_PORT:-4000}:4000"

  webhook-worker:
    image: curlimages/curl:8.11.1
    container_name: customermates-webhook-worker
    depends_on:
      - app
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      WEBHOOK_CRON_URL: http://app:4000/api/cron/webhook-deliveries
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do code=$$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $${CRON_SECRET}" "$${WEBHOOK_CRON_URL}"); case "$${code}" in 2*) ;; *) echo "[webhook-worker] $$(date -u +%H:%M:%SZ) cron returned $${code}" ;; esac; sleep 5; done'

volumes:
  postgres-data:
